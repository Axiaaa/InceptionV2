listen=YES
listen_ipv6=NO
background=NO
seccomp_sandbox=NO

anonymous_enable=NO
local_enable=YES
write_enable=YES
local_umask=022

chroot_local_user=YES
allow_writeable_chroot=YES
user_sub_token=$USER
local_root=/var/ftp

pasv_enable=YES
pasv_min_port=21100
pasv_max_port=21110
# pasv_address=YOUR_HOST_IP_OR_DOMAIN

xferlog_enable=YES