            </div>

                <img src="./assets/img/badges/quest.png" alt="" style="scale: 1.3;"/>

            </div>
            <div class="badge-item">
                <img src="./assets/img/badges/orb.svg" alt="" style="scale: 1.1;"/>

            </div>

    </div>
    <div class="profile-body">
        <div class="username">
            Nephtys
            <div class="badge">Human (I think)</div>
        </div>
        <div class="udername">
            <B>nephtys. · She/Her<B\>
        </div>
        <hr/>
        <div class="basic-infos">
            <div class="category-title">About Me</div>
            <p>
            French junior dev. Huge interest in Devops and Backend.<br>
            20yo. 42 School.

            </p>
        </div>
        <div class="basic-infos">
            <div class="category-title">Member Since</div>
            <p>Oct 25, 2016</p>
        </div>
        <div class="roles">
            <div class="category-title">Roles</div>

                </div>
                <div class="role role-add">
                    <div class="role-add-text">+</div>
                </div>
            </div>
        </div>
        <div class="note">
            <div class="category-title">Note</div>
            <textarea placeholder="Click for add a note"></textarea>
        </div>
    </div>
    <script src="/src/demo.js"></script>
